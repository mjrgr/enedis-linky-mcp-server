version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - bodyclose
    - contextcheck
    - noctx
    - exhaustive
    - godot

linters-settings:
  goimports:
    local-prefixes: github.com/mjrgr/enedis-linky-mcp-server
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers
  godot:
    scope: declarations

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
