name: Enedis Linky MCP Server Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  security-events: write
  actions: read

env:
  GH_PROJECT_NAME: enedis-linky-mcp-server

jobs:
  build:
    uses: ./.github/workflows/ci.yml
    secrets: inherit
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o "apsystems-mcp-${GOOS}-${GOARCH}${EXT}" ./cmd/server

      - name: Archive binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          binary_name="enedis-linky-mcp-${GOOS}-${GOARCH}${EXT}"

          if [ -f "$binary_name" ]; then
            sha256sum "$binary_name" > "$binary_name.sha256"
          else
            echo "Binary not found at expected location"
            exit 1
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: enedis-linky-mcp-*

  github-release:
    needs: release
    name: gh-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect commit messages since last tag
        id: commits
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:'☑️ %s' ${LAST_TAG}..HEAD)
          else
            COMMITS=$(git log --pretty=format:'☑️ %s')
          fi
          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            # Enedis Linky MCP Server ⚡🔌

            ## 🚀 What's new in ${{ github.ref_name }}
            ${{ env.COMMITS }}

            ## 📦 Installation

            ### 📄Binaires

            Download the binary corresponding to your platform from the assets below.
            The `.sha256` files contain checksums to verify the integrity of the binaries.

            ```bash
            sha256sum -c enedis-linky-mcp-[arch].sha256
            ```

            ### 🐳 Get OCI image

            To pull generated image:

            ```bash
            # Podman
            podman pull ${{ vars.CR_REGISTRY }}/${{ env.GH_PROJECT_NAME }}:${{ github.ref_name }}

            # Docker
            docker pull ${{ vars.CR_REGISTRY }}/${{ env.GH_PROJECT_NAME }}:${{ github.ref_name }}
            ```

          files: release-artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
