version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - bodyclose
    - noctx
    - exhaustive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/mjrgr/enedis-linky-mcp-server

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
