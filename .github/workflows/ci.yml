name: Enedis Linky MCP Server CI

permissions:
  contents: write
  security-events: write
  actions: read

on:
  workflow_call:
    outputs:
      image-digest:
        description: "Container image digest"
        value: ${{ jobs.build.outputs.image-digest }}
      image-tag:
        description: "Container image name"
        value: ${{ jobs.build.outputs.image-name }}
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

env:
  GH_PROJECT_NAME: enedis-linky-mcp-server

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./cmd/server

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10

  container:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: [build, lint]
    outputs:
      image-digest: ${{ steps.build-image.outputs.digest }}
      image-name: ${{ steps.build-image.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq podman

      - name: Set image tag
        id: imagetag
        run: |
          if [ "${GITHUB_REF}" == "refs/heads/main" ]; then
            IMAGE_TAG=latest
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            IMAGE_TAG=${TAG_NAME}
          else
            SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)
            IMAGE_TAG=${SHORT_SHA}
          fi
          IMAGE_NAME=$GH_PROJECT_NAME:$IMAGE_TAG
          IMAGE=${{ vars.CR_REGISTRY }}/$IMAGE_NAME
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Build image
        id: build-image
        run: |
          podman build -t $IMAGE -f Containerfile .
          podman save > podman-image.tar $IMAGE
          DIGEST=$(podman inspect --format='{{.Digest}}' $IMAGE)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "name=${IMAGE_NAME}" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          input: 'podman-image.tar'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push image
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          # Push to Docker Registry
          echo "Pushing image $IMAGE"
          echo "${{ secrets.CR_PASSWORD }}" | podman login -u "${{ secrets.CR_USERNAME }}" --password-stdin ${{ vars.CR_REGISTRY }}
          podman push $IMAGE

          # Push to GitHub Container Registry
          GHCR_IMAGE=ghcr.io/${{ github.repository }}:${IMAGE_TAG}
          echo "Pushing image $GHCR_IMAGE"
          podman tag $IMAGE $GHCR_IMAGE
          echo "${{ secrets.GHP_TOKEN }}" | podman login ghcr.io -u ${{ github.repository_owner }} --password-stdin
          podman push $GHCR_IMAGE
